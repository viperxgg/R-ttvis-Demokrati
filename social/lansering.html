<!DOCTYPE html>
<html lang="sv"><head><meta charset="utf-8">
<title>Lansering — Rättvis Demokrati</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Source+Sans+3:wght@400;600;700&family=PT+Serif:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; }
  body { font-family:'Source Sans 3',sans-serif; background:#1E2A5E; color:#fff; overflow:hidden; position:relative; }
  .card { width:1080px; height:1350px; position:relative;
    background:
      radial-gradient(1200px 700px at 50% -10%, #26356f 0%, #1E2A5E 55%, #172245 100%); }
  /* gold corner ticks */
  .tick { position:absolute; width:70px; height:70px; border:6px solid #F5A81E; }
  .t-tl{ top:44px; left:44px; border-right:none; border-bottom:none; }
  .t-tr{ top:44px; right:44px; border-left:none; border-bottom:none; }
  .inner { position:absolute; top:0; left:0; right:0; padding:96px 90px 0; text-align:center; }
  .overline { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:30px;
    letter-spacing:.34em; color:#F5A81E; text-transform:uppercase; }
  .logo-wrap { margin:34px auto 22px; width:190px; height:190px; border-radius:50%;
    background:#fff; border:6px solid #F5A81E; padding:12px;
    box-shadow:0 20px 50px rgba(0,0,0,.35); }
  .logo-wrap img { width:100%; height:100%; object-fit:contain; border-radius:50%; }
  .party { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:70px;
    line-height:.98; letter-spacing:.01em; text-transform:uppercase; }
  .sub { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:30px;
    letter-spacing:.22em; color:#9fb0e8; text-transform:uppercase; margin-top:6px; }
  .headline { font-family:'Barlow Condensed',sans-serif; font-weight:700; text-transform:uppercase;
    font-size:96px; line-height:.94; margin-top:46px; }
  .mark { background:#F5A81E; color:#141B44; padding:2px 16px; box-decoration-break:clone;
    -webkit-box-decoration-break:clone; }
  .lead { font-size:30px; color:#e7ebfa; margin-top:30px; line-height:1.45; font-weight:600; }
  .chips { margin-top:34px; display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
  .chip { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:30px;
    text-transform:uppercase; letter-spacing:.05em; color:#fff;
    border:3px solid rgba(245,168,30,.85); border-radius:999px; padding:12px 30px; }
  .urlbar { position:absolute; left:90px; right:90px; bottom:300px; background:#F5A81E;
    border-radius:16px; padding:26px 20px; text-align:center;
    box-shadow:0 18px 46px rgba(0,0,0,.35); }
  .urlbar .u { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:64px;
    color:#141B44; letter-spacing:.01em; }
  .datebadge { position:absolute; left:0; right:0; bottom:230px; text-align:center; }
  .datebadge span { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:28px;
    letter-spacing:.12em; text-transform:uppercase; color:#F5A81E;
    border:3px solid rgba(245,168,30,.7); border-radius:999px; padding:10px 28px; }
  .skyline { position:absolute; left:0; right:0; bottom:0; width:100%; display:block; }
</style></head>
