name: Kommunbevakningen

# Uppdaterar nyhetssidan (/nyheter) automatiskt två gånger om dagen.
on:
  schedule:
    - cron: "17 5,17 * * *"  # 05:17 och 17:17 UTC — avlastad minut (mindre kö-fördröjning än :00)
  workflow_dispatch: {}        # gör att den även kan köras manuellt

permissions:
  contents: write

concurrency:
  group: kommunbevakning
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Uppdatera nyheter
        run: python scripts/update_news.py

      - name: Commit om något ändrats
        run: |
          git config user.name "Kommunbevakningen (bot)"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain nyheter/index.html)" ]; then
            git add nyheter/index.html
            git commit -m "Uppdatera Kommunbevakningen [skip ci]"
            git push
            echo "Nyheter uppdaterade."
          else
            echo "Inga ändringar."
          fi
